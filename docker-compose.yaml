services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: vagtplanDB
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
    volumes:
      - db-data:/var/lib/postgresql
    ports:
      - "5432:5432"
  web:
    build: .
    depends_on:
      - api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:80
      - ApiBaseUrl=http://localhost:3000/
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    ports:
      - "8080:80"

  api:
    build:
      context: .
      dockerfile: VagtPlan.ApiService/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Expire__Minutes=${JWT_EXPIRE_MINUTES}
      - ADMIN_AUTH_USERNAME=${ADMIN_AUTH_USERNAME}
      - ADMIN_AUTH_PASSWORD=${ADMIN_AUTH_PASSWORD}
      - ADMIN_AUTH_ROLE_NAME=${ADMIN_AUTH_ROLE_NAME}
      - ADMIN_AUTH_DEPARTMENT_NAME=${ADMIN_AUTH_DEPARTMENT_NAME}
      # Enable developer logs and host diagnostics to capture native crashes
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - COREHOST_TRACE=1
      - COREHOST_TRACE_VERBOSITY=4
      - DOTNET_EnableDiagnostics=1
    depends_on:
      - postgres
    ports:
      - "3000:80"

networks:
  default:
    driver: bridge

volumes:
  db-data: