services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: vagtplanDB
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      # Mount parent dir so existing data in volume/data/ is preserved across deploys.
      - vagtplan_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
  web:
    build: .
    depends_on:
      - api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:80
      - ApiBaseUrl=${ApiBaseUrl}
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    ports:
      - "8080:80"

  api:
    build:
      context: .
      dockerfile: VagtPlan.ApiService/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Expire__Minutes=${JWT_EXPIRE_MINUTES}
      - ADMIN_AUTH_USERNAME=${ADMIN_AUTH_USERNAME}
      - ADMIN_AUTH_PASSWORD=${ADMIN_AUTH_PASSWORD}
      - ADMIN_AUTH_ROLE_NAME=${ADMIN_AUTH_ROLE_NAME}
      - ADMIN_AUTH_DEPARTMENT_NAME=${ADMIN_AUTH_DEPARTMENT_NAME}
      # Enable developer logs and host diagnostics to capture native crashes
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - COREHOST_TRACE=1
      - COREHOST_TRACE_VERBOSITY=4
      - DOTNET_EnableDiagnostics=1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:80"

networks:
  default:
    driver: bridge

volumes:
  vagtplan_postgres_data:
    # Fixed name so Portainer redeploys always attach the same volume.
    # If you already have data in an older volume (e.g. vagtplan_db-data), set name to that here once.
    name: vagtplan_postgres_data