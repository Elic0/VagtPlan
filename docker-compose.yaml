services:
  web:
    build: .
    ports:
      - "80:80"

  api:
    build:
      context: .
      dockerfile: VagtPlan.ApiService/Dockerfile
    ports:
      - "3000:3000"

  db:
    image: postgres
    volumes:
      - db-data:/var/lib/postgresql/data

networks:
  default:
    driver: bridge

volumes:
  db-data: