server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types application/wasm application/javascript text/javascript text/css application/json;
    gzip_vary on;

    # API proxy
    location /api/ {
        proxy_pass http://api:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Blazor framework files - must be served with proper caching
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # WebAssembly files
    location ~* \.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # JavaScript files in framework
    location ~* _framework/.*\.js$ {
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # CSS files - cache longer
    location ~* \.css$ {
        default_type text/css;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static assets - cache for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Main application - SPA routing
    location / {
        # Try to serve file directly, fallback to index.html for SPA routing
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}