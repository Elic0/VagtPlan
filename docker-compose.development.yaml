services:
  postgres:
    image: postgres:16-alpine
    container_name: vagtplanDB
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - vagtplan_postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    image: ${DOCKER_REGISTRY-}api
    hostname: api
    build:
      context: .
      dockerfile: VagtPlan.ApiService/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - JWT__AUDIENCE=${JWT_AUDIENCE}
      - JWT__ISSUER=${JWT_ISSUER}
      - JWT__SECRET=${JWT_SECRET}
      - JWT__EXPIRE__MINUTES=${JWT_EXPIRE_MINUTES}
      - ADMIN_AUTH_USERNAME=${ADMIN_AUTH_USERNAME}
      - ADMIN_AUTH_PASSWORD=${ADMIN_AUTH_PASSWORD}
      - ADMIN_AUTH_ROLE_NAME=${ADMIN_AUTH_ROLE_NAME}
      - ADMIN_AUTH_DEPARTMENT_NAME=${ADMIN_AUTH_DEPARTMENT_NAME}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
    ports:
      - "${API_HTTP_PORT}:3000"
    restart: unless-stopped

  web:
    image: ${DOCKER_REGISTRY-}web
    hostname: frontend
    build:
      context: .
      dockerfile: VagtPlan.Web/Dockerfile
    depends_on:
      - api
    networks:
      - default
    ports:
      - "${BLAZOR_HTTP_PORT}:80"
    restart: unless-stopped

networks:
  default:
    driver: bridge

volumes:
  vagtplan_postgres_data:
    name: vagtplan_postgres_data
