services:
  api:
    image: ${DOCKER_REGISTRY-}api
    hostname: api
    build:
      context: .
      dockerfile: VagtPlan.ApiService/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - JWT__AUDIENCE=${JWT_AUDIENCE}
      - JWT__ISSUER=${JWT_ISSUER}
      - JWT__SECRET=${JWT_SECRET}
      - JWT__EXPIRE__MINUTES=${JWT_EXPIRE_MINUTES}
    networks:
      - default
    ports:
      - "${API_HTTP_PORT}:3000"
    restart: unless-stopped

  web:
    image: ${DOCKER_REGISTRY-}web
    hostname: frontend
    build:
      context: .
      dockerfile: VagtPlan.Web/Dockerfile
    networks:
      - default
    ports:
      - "${BLAZOR_HTTP_PORT}:80"
    restart: unless-stopped

networks:
  default:
    driver: bridge
     